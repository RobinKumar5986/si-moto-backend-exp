spring.application.name=si-moto-backend-exp

#port number
server.port=8080

#db connection
spring.datasource.url = jdbc:postgresql://localhost:5432/si_moto_db
spring.datasource.username=postgres
spring.datasource.password=post@#$6550

#db config
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate Config
spring.jpa.properties.hibernate.format_sql=true

# Essential for PostgreSQL table generation
spring.jpa.generate-ddl=true

# Hibernate-specific lazy loading property
# This helps avoid 'no session' errors by allowing initialization outside of a transaction
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# File upload settings (updated for your project)
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
files.video=videos/